data:
  raw_data_path: data/raw/creditcard.csv
  train_path: data/processed/train.csv
  test_path: data/processed/test.csv
  processed_train_path: data/processed/train_processed.csv
  processed_test_path: data/processed/test_processed.csv

model:
  random_state: 42
  test_size: 0.2


artifacts:
  amount_scaler: models/amount_scaler.pkl
  time_scaler: models/time_scaler.pkl
  best_model: models/best_model.pkl



training:
  models:
    logistic_regression:
      max_iter: 1000

    random_forest:
      n_estimators: 100
      max_depth: None

    xgboost:
      n_estimators: 100

  # evaluation_metric: f1
  # save_best_model: True

drift:
  reference_data_path: data/processed/train_processed.csv
  current_data_path: data/processed/test_processed.csv
  method: ks_test
  threshold: 0.05

reports:
  drift_report: reports/drift_report.json

